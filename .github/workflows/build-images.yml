name: Build and Push Images

on:
  workflow_call:
    inputs:
      version:
        description: "Semantic version (e.g. 1.2.3) — passed by release workflow"
        required: false
        type: string
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: control-plane
            dockerfile: deploy/docker/control-plane/Dockerfile
            context: .
          - image: admin
            dockerfile: deploy/docker/admin/Dockerfile
            context: .
          - image: managed-user
            dockerfile: deploy/docker/managed-user/Dockerfile
            context: .
          - image: sing-box-gateway
            dockerfile: deploy/docker/sing-box-gateway/Dockerfile
            context: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image prefix (lowercase)
        run: echo "IMAGE_PREFIX=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/cloud-cli-proxy" >> "$GITHUB_ENV"

      - name: Sync image.lock version for managed-user
        if: matrix.image == 'managed-user' && inputs.version != ''
        env:
          VERSION: ${{ inputs.version }}
          IMAGE_PREFIX: ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/cloud-cli-proxy
        run: |
          LOCK="deploy/docker/managed-user/image.lock"
          sed -i "s|^image_name: .*|image_name: ${IMAGE_PREFIX}/managed-user:v${VERSION}|" "$LOCK"
          sed -i "s|^local_dev_image_name: .*|local_dev_image_name: ${IMAGE_PREFIX}/managed-user:v${VERSION}|" "$LOCK"
          sed -i "s|^image_version: .*|image_version: v${VERSION}|" "$LOCK"
          echo "Updated image.lock:"
          grep -E '^(image_name|local_dev_image_name|image_version):' "$LOCK"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}
          tags: |
            type=sha,prefix=
            type=semver,pattern={{version}},value=${{ inputs.version }},enable=${{ inputs.version != '' }}
            type=semver,pattern={{major}}.{{minor}},value=${{ inputs.version }},enable=${{ inputs.version != '' }}
            type=semver,pattern={{major}},value=${{ inputs.version }},enable=${{ inputs.version != '' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ inputs.version != '' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha,scope=${{ matrix.image }}
            type=registry,ref=${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:buildcache
          cache-to: |
            type=gha,scope=${{ matrix.image }},mode=max
            type=registry,ref=${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:buildcache,mode=max

      # Scheme B (D-29): multi-arch push cannot --load; separate amd64 load build for size inspect only.
      - name: Build managed-user (amd64 load-only for size gate)
        if: matrix.image == 'managed-user'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          load: true
          push: false
          tags: managed-user:size-gate
          cache-from: |
            type=gha,scope=${{ matrix.image }}
            type=registry,ref=${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:buildcache

      - name: Assert managed-user image size <= 3GB
        if: matrix.image == 'managed-user'
        run: |
          set -euo pipefail
          SIZE_BYTES=$(docker image inspect --format='{{.Size}}' managed-user:size-gate)
          SIZE_MB=$(( SIZE_BYTES / 1048576 ))
          echo "managed-user image size: ${SIZE_BYTES} bytes (${SIZE_MB} MiB)"
          if [ "${SIZE_BYTES}" -gt 2147483648 ]; then
            echo "::error::managed-user image ${SIZE_MB} MiB exceeds 2048 MiB hard cap (BASE-04)"
            exit 1
          fi
