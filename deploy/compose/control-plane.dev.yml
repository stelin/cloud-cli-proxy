services:
  postgres:
    image: postgres:18.3
    environment:
      POSTGRES_DB: cloudproxy
      POSTGRES_USER: cloudproxy
      POSTGRES_PASSWORD: cloudproxy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cloudproxy -d cloudproxy"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - cloudproxy-postgres:/var/lib/postgresql

  control-plane:
    build:
      context: ../..
      dockerfile: deploy/docker/control-plane/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://cloudproxy:cloudproxy@postgres:5432/cloudproxy?sslmode=disable
      - CONTROL_PLANE_ADDR=:8080
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://127.0.0.1:8080/healthz"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "8080:8080"

volumes:
  cloudproxy-postgres:
